spring:
  main:
    allow-circular-references: true
  datasource:
    url: "jdbc:postgresql://db:5432/${POSTGRES_DB}"
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driverClassName: org.postgresql.Driver
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate.format_sql: false
      hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      hibernate.search.enabled: false
  flyway:
    enabled: false

  # ── Model Context Protocol (MCP) server ─────────────────────────────────────
  # Exposes HAPI FHIR as an MCP tool server at POST /mcp (Streamable HTTP).
  # Connect any MCP client (Claude Desktop, Cursor, MCP Inspector) to:
  #   http://localhost:8080/mcp
  #
  # Claude Desktop (claude_desktop_config.json):
  #   "mcpServers": {
  #     "hapi-fhir-mcp_poc": {
  #       "command": "npx",
  #       "args": ["mcp-remote@latest", "http://localhost:8080/mcp"]
  #     }
  #   }
  #
  # MCP Inspector (browser-based testing):
  #   npx @modelcontextprotocol/inspector
  #   → Connect to: http://localhost:8080/mcp  (Streamable HTTP)
  ai:
    mcp:
      server:
        enabled: true
        name: HAPI-FHIR MCP POC
        instructions: >
          This server provides access to the MCP POC HAPI-FHIR JPA store.
          Use it to query, create, and update FHIR resources. All resources follow HL7 FHIR.
  autoconfigure:
    exclude:
      # Completely remove Spring Boot's Elasticsearch client beans
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      # hapi-fhir: Spring AI MCP Server Auto Configuration is currently not supported 
      - org.springframework.ai.mcp.server.common.autoconfigure.annotations.McpServerAnnotationScannerAutoConfiguration
      - org.springframework.ai.mcp.server.common.autoconfigure.annotations.McpServerSpecificationFactoryAutoConfiguration

hapi:
  fhir:
    fhir_version: R4
    default_encoding: JSON
    default_pretty_print: true
    reuse_cached_search_results_millis: 3000

    # Expose the built-in HAPI FHIR Tester web UI.
    # HAPI_TESTER_SERVER_ADDRESS is injected by Docker Compose (defaults to
    # http://localhost:8080/fhir). Override it in .env or compose.yml when
    # the server is reachable at a different hostname or port.
    tester:
      home:
        name: "HAPI FHIR POC"
        server_address: "${HAPI_TESTER_SERVER_ADDRESS:-http://localhost:8080/fhir}"
        refuse_to_fetch_third_party_urls: false
        fhir_version: R4

    validation:
      enabled: false            # keep startup fast for POC

    cors:
      allow_Credentials: true
      allowed_origin:
        - "*"                   # WARNING: wildcard CORS – restrict in production
